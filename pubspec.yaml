name: munilab
description: MuniLab - Plataforma de servicios vecinales
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.1.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  permission_handler: ^11.3.0
  image_picker: ^1.1.0
  url_launcher: ^6.2.5
  flutter_svg: ^2.0.10+1
  font_awesome_flutter: ^10.7.0
  flutter_localizations:
    sdk: flutter
  smooth_page_indicator: ^1.1.0
  diacritic: ^0.1.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/tarjeta.svg
    - assets/images/header_bg.png
    - assets/images/footer_bg.png
    - assets/images/footer_background_full.png
    - assets/images/logo_munilab.png
    - assets/images/cardesquina.png
    - assets/images/footer1.png
    - assets/icons/ICONO_APP-03.png
    - assets/images/eventos/
    - assets/images/taller/
    - assets/images/vecino/
    - assets/images/emp/
dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  image_path: "assets/icons/ICONO_APP-03.png"
  android: true
  ios: true
  name: "MuniLab"